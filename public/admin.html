<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07110a" />
  <title>FxzzStore | لوحة الأدمن</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="theme-green">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>
  <div class="noise-layer"></div>

  <header class="topbar glass-card topbar-luxe">
    <div class="brand-line brand-line-large"><span class="brand-dot"></span><strong>FxzzStore Admin</strong></div>
    <div class="topbar-right" id="adminQuick"></div>
  </header>

  <main class="page-shell admin-shell page-shell-luxe">
    <section class="glass-card section-hero section-hero-admin">
      <div>
        <span class="eyebrow">ADMIN CONTROL</span>
        <h1>لوحة التحكم الرئيسية</h1>
        <p class="muted">إدارة المستخدمين والبطاقات والجلسات بشكل أوضح ومنظم أكثر.</p>
      </div>
    </section>

    <section class="stats-grid" id="statsGrid"></section>

    <section class="admin-grid-luxe">
      <div class="glass-card">
        <div class="section-head-inline"><h3>المستخدمون</h3><span class="pill">إدارة</span></div>
        <form id="addUserForm" class="form-grid small-gap form-grid-admin">
          <input type="text" id="newUserName" placeholder="اسم المستخدم" required />
          <input type="email" id="newUserEmail" placeholder="البريد الإلكتروني" required />
          <input type="text" id="newUserPassword" placeholder="كلمة المرور" required />
          <select id="newUserRole"><option value="user">User</option><option value="admin">Admin</option></select>
          <button class="primary-btn" type="submit">إضافة مستخدم</button>
        </form>
        <div id="usersTable" class="table-list"></div>
      </div>

      <div class="glass-card">
        <div class="section-head-inline"><h3>بطاقات Steam</h3><span class="pill">المحتوى</span></div>
        <form id="addCardForm" class="form-grid small-gap form-grid-admin">
          <input type="text" id="gameName" placeholder="اسم اللعبة" required />
          <input type="text" id="gameCategory" placeholder="القسم" required />
          <input type="text" id="steamUser" placeholder="اسم المستخدم" required />
          <input type="text" id="steamPass" placeholder="كلمة المرور" required />
          <input type="url" id="gameImage" placeholder="رابط الصورة" required />
          <button class="primary-btn" type="submit">إضافة بطاقة</button>
        </form>
        <div id="steamTable" class="table-list"></div>
      </div>
    </section>

    <section class="glass-card">
      <div class="section-head-inline"><h3>الجلسات النشطة</h3><span class="pill">Live</span></div>
      <div id="sessionTable" class="table-list"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="/shared.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
